<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AlumniConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <h2>Login to Your Account</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <p style="margin-top: 20px;">Don't have an account? <a href="register.html" style="color: var(--primary);">Register here</a></p>
            <p style="margin-top: 15px; text-align: center;">
                <a href="#" onclick="showAdminLogin()" style="color: var(--primary); font-weight: 500;">
                    <i class="fas fa-shield-alt"></i> Admin Login
                </a>
            </p>
        </form>
        
        
    </div>
    <script src="script.js"></script>
</body>
</html>
